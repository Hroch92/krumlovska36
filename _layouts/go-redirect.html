<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Přesměrování...</title>
    <meta name="robots" content="noindex, nofollow">
  </head>
  <body data-redirect-to="{{ page.redirect_to | escape }}">
     <script
       data-goatcounter="https://krumlovska36.goatcounter.com/count"
       src="//gc.zgo.at/count.js"></script>
     <p>Přesměrování...</p>
    <script>
      (function () {
        var target = document.body.getAttribute("data-redirect-to") || "/";
        var redirected = false;

        function go() {
          if (redirected) {
            return;
          }
          redirected = true;
          window.location.replace(target);
        }

        // Wait for GoatCounter script to load and log pageview.
        var checkCounter = setInterval(function () {
          if (window.goatcounter) {
            clearInterval(checkCounter);
            // Give GoatCounter a moment to send the pageview.
            setTimeout(go, 100);
          }
        }, 10);

        // Fallback timeout if GoatCounter doesn't load.
        setTimeout(go, 2000);
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url={{ page.redirect_to | escape }}">
      <a href="{{ page.redirect_to | escape }}">Pokračovat</a>
    </noscript>
  </body>
</html>
