layout: nil
---
<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Přesměrování...</title>
    <meta name="robots" content="noindex, nofollow">
  </head>
  <body data-redirect-to="{{ page.redirect_to | escape }}">
    <p>Přesměrování...</p>
    <img
      id="goatcounter-pixel"
      src="https://krumlovska36.goatcounter.com/count?p={{ page.url | uri_escape }}"
      alt=""
      width="1"
      height="1"
      style="position:absolute;left:-9999px;width:1px;height:1px"
      referrerpolicy="no-referrer-when-downgrade">
    <script>
      (function () {
        var target = document.body.getAttribute("data-redirect-to") || "/";
        var redirected = false;
        var pixel = document.getElementById("goatcounter-pixel");

        function go() {
          if (redirected) {
            return;
          }
          redirected = true;
          window.location.replace(target);
        }

        if (pixel) {
          pixel.addEventListener("load", go, { once: true });
          pixel.addEventListener("error", go, { once: true });
        }

        setTimeout(go, 800);
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url={{ page.redirect_to | escape }}">
      <a href="{{ page.redirect_to | escape }}">Pokračovat</a>
    </noscript>
  </body>
</html>
